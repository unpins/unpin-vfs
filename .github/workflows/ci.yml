name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install zstd (dev Makefile links libzstd)
        run: sudo apt-get update && sudo apt-get install -y libzstd-dev
      - name: In-memory round-trip (zstd/deflate/stored + dict)
        run: make check
      - name: Directory superset (opendir/readdir/fopen + --wrap fall-through)
        run: make dircheck
      - name: Self-EOF mode (ZIP appended to the binary, unpin/* hidden)
        run: make selfcheck
      - name: Carry an existing tail-ZIP (cosmo /zip/ store) into a zstd repack
        run: make carrycheck
      - name: Vendored zstddeclib.c decode (shipped runtime path, no libzstd link)
        run: make vendorcheck
